<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="url(#bg)"/>

  <!-- Title -->
  <text x="960" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#ffffff">All Actions at a Glance</text>
  <text x="960" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#9ca3af">Three actions to keep you on schedule</text>

  <!-- Stream Deck body mockup -->
  <rect x="310" y="170" width="1300" height="680" rx="40" fill="#1c2128" stroke="#30363d" stroke-width="3"/>
  <rect x="350" y="210" width="1220" height="600" rx="20" fill="#0a0e14"/>

  <!-- Row 1: 5 keys -->
  <!-- Key 1,1: Empty -->
  <rect x="400" y="250" width="190" height="190" rx="14" fill="#111111" stroke="#222222" stroke-width="1"/>

  <!-- Key 1,2: Smart Calendar (green) -->
  <rect x="620" y="250" width="190" height="190" rx="14" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="620" y="250" width="190" height="4" rx="2" fill="#22c55e"/>
  <text x="715" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Smart Calendar</text>
  <text x="715" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#ffffff">2:45:30</text>
  <text x="715" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Next Meeting</text>
  <!-- Label below -->
  <text x="715" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">⭐ Smart Calendar</text>

  <!-- Key 1,3: Next Meeting (orange) -->
  <rect x="840" y="250" width="190" height="190" rx="14" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="840" y="250" width="190" height="4" rx="2" fill="#f97316"/>
  <text x="935" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Next Meeting</text>
  <text x="935" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#f97316">4:12</text>
  <text x="935" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Team Standup</text>
  <text x="935" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f97316">Next Meeting</text>

  <!-- Key 1,4: Time Left (blue) -->
  <rect x="1060" y="250" width="190" height="190" rx="14" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1060" y="250" width="190" height="4" rx="2" fill="#3b82f6"/>
  <text x="1155" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Time Left</text>
  <text x="1155" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#ffffff">23:15</text>
  <text x="1155" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Design Review</text>
  <text x="1155" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Time Left</text>

  <!-- Key 1,5: Empty -->
  <rect x="1280" y="250" width="190" height="190" rx="14" fill="#111111" stroke="#222222" stroke-width="1"/>

  <!-- Row 2: 5 keys showing different states -->
  <!-- Key 2,1: Empty -->
  <rect x="400" y="510" width="190" height="190" rx="14" fill="#111111" stroke="#222222" stroke-width="1"/>

  <!-- Key 2,2: Smart Calendar during meeting -->
  <rect x="620" y="510" width="190" height="190" rx="14" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="620" y="510" width="190" height="4" rx="2" fill="#3b82f6"/>
  <text x="715" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Smart Calendar</text>
  <text x="715" y="615" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#ffffff">15:42</text>
  <text x="715" y="645" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Time Left</text>
  <text x="715" y="725" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">↕ Auto-switches modes</text>

  <!-- Key 2,3: Next Meeting (red) -->
  <rect x="840" y="510" width="190" height="190" rx="14" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="840" y="510" width="190" height="4" rx="2" fill="#ef4444"/>
  <text x="935" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Next Meeting</text>
  <text x="935" y="615" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#ef4444">0:15</text>
  <text x="935" y="645" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Starting now!</text>
  <text x="935" y="725" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">🔴 Red = imminent</text>

  <!-- Key 2,4: No Meetings -->
  <rect x="1060" y="510" width="190" height="190" rx="14" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1060" y="510" width="190" height="4" rx="2" fill="#22c55e"/>
  <text x="1155" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#9ca3af">No Meetings</text>
  <text x="1155" y="630" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563">Today</text>
  <text x="1155" y="725" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">All clear!</text>

  <!-- Key 2,5: Empty -->
  <rect x="1280" y="510" width="190" height="190" rx="14" fill="#111111" stroke="#222222" stroke-width="1"/>
</svg>
