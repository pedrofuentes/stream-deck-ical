<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" width="1920" height="960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="url(#bg)"/>

  <!-- Title -->
  <text x="960" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#ffffff">Multiple Calendars &amp; Key Interactions</text>
  <text x="960" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#9ca3af">Assign different calendars to different keys — tap for details</text>

  <!-- Left section: Multiple Calendars -->
  <rect x="80" y="170" width="860" height="720" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="2"/>
  <text x="510" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#ffffff">Multiple Calendars</text>
  <text x="510" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Each button shows events from its own calendar</text>

  <!-- Calendar labels -->
  <rect x="140" y="280" width="120" height="30" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="200" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">Work</text>

  <rect x="280" y="280" width="120" height="30" rx="6" fill="#22c55e" opacity="0.2"/>
  <text x="340" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">Personal</text>

  <rect x="420" y="280" width="120" height="30" rx="6" fill="#f97316" opacity="0.2"/>
  <text x="480" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f97316">Family</text>

  <!-- Row of 3 keys with different calendars -->
  <!-- Work key -->
  <rect x="140" y="330" width="220" height="220" rx="16" fill="#000000" stroke="#3b82f6" stroke-width="2"/>
  <rect x="140" y="330" width="220" height="5" rx="2" fill="#3b82f6"/>
  <text x="250" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6">Work</text>
  <text x="250" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#ffffff">1:30:15</text>
  <text x="250" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Sprint Planning</text>

  <!-- Personal key -->
  <rect x="400" y="330" width="220" height="220" rx="16" fill="#000000" stroke="#22c55e" stroke-width="2"/>
  <rect x="400" y="330" width="220" height="5" rx="2" fill="#22c55e"/>
  <text x="510" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e">Personal</text>
  <text x="510" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#ffffff">4:22:08</text>
  <text x="510" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Dentist Appt</text>

  <!-- Family key -->
  <rect x="660" y="330" width="220" height="220" rx="16" fill="#000000" stroke="#f97316" stroke-width="2"/>
  <rect x="660" y="330" width="220" height="5" rx="2" fill="#f97316"/>
  <text x="770" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#f97316">Family</text>
  <text x="770" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#9ca3af">No Meetings</text>
  <text x="770" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563">Today</text>

  <!-- Shared URL note -->
  <rect x="140" y="590" width="740" height="60" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="510" y="625" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Same URL? Shared cache — no duplicate fetches. Different URLs? Each fetches independently.</text>

  <!-- Named calendars list -->
  <text x="510" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Named Calendar Library</text>
  <text x="300" y="740" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#3b82f6">● Work</text>
  <text x="300" y="765" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">calendar.google.com/...</text>
  <text x="510" y="740" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e">● Personal</text>
  <text x="510" y="765" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">outlook.office.com/...</text>
  <text x="720" y="740" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f97316">● Family</text>
  <text x="720" y="765" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">p123-caldav.icloud.com/...</text>

  <!-- Right section: Key Interactions -->
  <rect x="980" y="170" width="860" height="720" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="2"/>
  <text x="1410" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#ffffff">Key Press Actions</text>
  <text x="1410" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Tap and double-tap for quick actions</text>

  <!-- Interaction 1: Tap for title -->
  <rect x="1040" y="285" width="760" height="170" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <text x="1080" y="320" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Single Tap → Show Meeting Title</text>
  <text x="1080" y="345" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Title scrolls as a marquee across the key</text>

  <!-- Before tap key -->
  <rect x="1080" y="365" width="140" height="70" rx="8" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1080" y="365" width="140" height="3" rx="1" fill="#22c55e"/>
  <text x="1150" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2:45</text>

  <text x="1240" y="405" font-family="system-ui, sans-serif" font-size="24" fill="#30363d">→</text>

  <!-- After tap key (showing title) -->
  <rect x="1270" y="365" width="250" height="70" rx="8" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1270" y="365" width="250" height="3" rx="1" fill="#22c55e"/>
  <text x="1395" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">Sprint Planning Meeting...</text>

  <text x="1580" y="405" font-family="system-ui, sans-serif" font-size="16" fill="#9ca3af">← scrolling marquee</text>

  <!-- Interaction 2: Double-tap refresh -->
  <rect x="1040" y="480" width="760" height="170" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <text x="1080" y="515" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Double Tap → Force Refresh</text>
  <text x="1080" y="540" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Re-fetches calendar data immediately</text>

  <!-- Before refresh key -->
  <rect x="1080" y="560" width="140" height="70" rx="8" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1080" y="560" width="140" height="3" rx="1" fill="#22c55e"/>
  <text x="1150" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2:45</text>

  <text x="1240" y="600" font-family="system-ui, sans-serif" font-size="24" fill="#30363d">→</text>

  <!-- Refreshing key -->
  <rect x="1270" y="560" width="140" height="70" rx="8" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1270" y="560" width="140" height="3" rx="1" fill="#3b82f6"/>
  <text x="1340" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#3b82f6">Refreshing...</text>

  <text x="1430" y="600" font-family="system-ui, sans-serif" font-size="24" fill="#30363d">→</text>

  <!-- Updated key -->
  <rect x="1460" y="560" width="140" height="70" rx="8" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1460" y="560" width="140" height="3" rx="1" fill="#22c55e"/>
  <text x="1530" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2:43</text>

  <!-- Interaction 3: Cycle meetings -->
  <rect x="1040" y="675" width="760" height="170" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <text x="1080" y="710" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Tap During Meeting → Cycle Events</text>
  <text x="1080" y="735" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">When meetings overlap, tap to see each one</text>

  <!-- First meeting -->
  <rect x="1080" y="755" width="140" height="70" rx="8" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1080" y="755" width="140" height="3" rx="1" fill="#3b82f6"/>
  <text x="1150" y="788" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Meeting 1/2</text>
  <text x="1150" y="808" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">15:30</text>

  <text x="1240" y="795" font-family="system-ui, sans-serif" font-size="24" fill="#30363d">→</text>

  <!-- Second meeting -->
  <rect x="1270" y="755" width="140" height="70" rx="8" fill="#000000" stroke="#30363d" stroke-width="1"/>
  <rect x="1270" y="755" width="140" height="3" rx="1" fill="#3b82f6"/>
  <text x="1340" y="788" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Meeting 2/2</text>
  <text x="1340" y="808" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">42:15</text>

  <text x="1500" y="795" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">← overlapping events</text>
</svg>
